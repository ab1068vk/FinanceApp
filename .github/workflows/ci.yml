name: CI

on:
  push:
  pull_request:

jobs:
  backend-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json
      - run: npm ci
        working-directory: backend
      - run: npm test -- --detectOpenHandles --ci --json --outputFile=jest-results.json
        working-directory: backend
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: backend-test-results
          path: backend/jest-results.json

  backend-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json
      - run: npm ci
        working-directory: backend
      - run: npm audit --audit-level=moderate
        working-directory: backend

  mobile-typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: mobile/package-lock.json
      - run: npm ci
        working-directory: mobile
      - run: npx tsc --noEmit
        working-directory: mobile

  mobile-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: mobile/package-lock.json
      - run: npm ci
        working-directory: mobile
      - run: npm test
        working-directory: mobile

  mobile-production-pinning-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: mobile/package-lock.json
      - run: npm ci
        working-directory: mobile
      - name: Production build fails without TLS pin
        run: |
          if npm run check:production-pinning; then
            echo "Expected missing EXPO_PUBLIC_API_CERT_HASH to fail"
            exit 1
          fi
        working-directory: mobile
      - name: Production build accepts configured TLS pin
        run: npm run check:production-pinning
        working-directory: mobile
        env:
          EXPO_PUBLIC_API_CERT_HASH: sha256/test-ci-pin

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci
        working-directory: backend
      - run: npm run lint
        working-directory: backend
      - run: npm ci
        working-directory: mobile
      - run: npm run lint
        working-directory: mobile
